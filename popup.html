<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GitHub Folder Downloader Settings</title>
  <style>
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      padding: 16px;
      background-color: #f6f8fa;
      color: #24292f;
      margin: 0;
    }
    h2 {
      font-size: 16px;
      margin-top: 0;
      margin-bottom: 12px;
      border-bottom: 1px solid #d0d7de;
      padding-bottom: 8px;
    }
    p {
      font-size: 13px;
      color: #57606a;
      line-height: 1.4;
      margin-top: 0;
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      box-sizing: border-box;
      padding: 5px 12px;
      font-size: 14px;
      line-height: 20px;
      color: #24292f;
      background-color: #ffffff;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      box-shadow: inset 0 1px 0 rgba(208,215,222,0.2);
      margin-bottom: 12px;
    }
    input[type="text"]:focus, input[type="password"]:focus {
      border-color: #0969da;
      outline: none;
      box-shadow: inset 0 0 0 1px #0969da;
    }
    button {
      color: #ffffff;
      background-color: #2da44e;
      border: 1px solid rgba(27,31,36,0.15);
      border-radius: 6px;
      padding: 5px 16px;
      font-size: 14px;
      font-weight: 500;
      line-height: 20px;
      white-space: nowrap;
      cursor: pointer;
      width: 100%;
      box-sizing: border-box;
      transition: 0.2s cubic-bezier(0.3, 0, 0.5, 1);
      transition-property: color, background-color, border-color;
    }
    button:hover {
      background-color: #2c974b;
    }
    #status {
      font-size: 13px;
      margin-top: 12px;
      color: #2da44e;
      text-align: center;
      min-height: 18px;
    }
    a {
      color: #0969da;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h2>GitHub API Settings</h2>
  <p>To avoid hitting GitHub's API rate limits (60 requests/hr) when downloading large folders, provide a Personal Access Token.</p>
  
  <label for="gh-token">Personal Access Token</label>
  <input type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxxxxx">
  
  <button id="save-btn">Save Token</button>
  <div id="status"></div>
  
  <p style="margin-top: 16px; font-size: 12px;">
    Generate a token with no specific scopes <a href="https://github.com/settings/tokens/new" target="_blank">here</a>.
  </p>

  <script src="popup.js"></script>
</body>
</html>
